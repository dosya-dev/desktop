appId: dev.dosya.desktop
productName: dosya
artifactName: "${productName}-${version}-${arch}.${ext}"
copyright: Copyright 2025 dosya.dev

directories:
  output: release
  buildResources: build

files:
  - "out/**/*"
  - "build/*.png"
  - "node_modules/**/*"
  - "!node_modules/*/{test,tests,__tests__,__mocks__,.github}/**"
  - "!node_modules/*/{CHANGELOG,README,readme,changelog}*"
  - "!node_modules/**/*.{ts,map,md}"
  - "!node_modules/**/{.eslintrc,.prettier*,tsconfig}*"

# Disable auto-update publish — we upload to R2 via our own API
publish: []

# ── macOS ───────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - universal
  icon: build/icon.png
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

# ── Windows ─────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: appx
      arch:
        - x64
  icon: build/icon.png
  signingHashAlgorithms:
    - sha256

# ── Microsoft Store (MSIX/AppX) ────────────────────────────────────
appx:
  identityName: "dosya.dev.dosya.dev"
  displayName: "dosya"
  publisher: "CN=9C40EE20-FDD6-4D45-BE36-45A257E76FCA"
  publisherDisplayName: "dosya.dev"
  applicationId: "dosya"
  backgroundColor: "#f9f8f6"
  languages:
    - en-US

# ── Linux ───────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: build/icon.png
  category: Utility

# ── Installer options ──────────────────────────────────────────────
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# ── Protocol registration ──────────────────────────────────────────
protocols:
  - name: dosya
    schemes:
      - dosya
